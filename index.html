<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST QR</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<h1>LAB QR</h1>

<div id="reader" style="width:350px;"></div>

<div id="resultado">
Esperando lectura...
</div>
<br>

<button id="btnSiguiente" style="display:none;">
Escanear siguiente
</button>


<script>

const html5QrCode =
  new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(cameras => {

  let cameraId = cameras[0].id;

  const trasera = cameras.find(c =>
    c.label.toLowerCase().includes("trasera")
  );

  if (trasera) {
    cameraId = trasera.id;
  }

  html5QrCode.start(
    cameraId,
    {
      fps: 10,
      qrbox: 250
    },
    async (decodedText) => {

  document.getElementById("resultado").innerHTML =
    "Validando: " + decodedText;
    await html5QrCode.stop();

document.getElementById("btnSiguiente").style.display =
  "inline-block";

  try {

   const respuesta = await fetch(
  "https://script.google.com/macros/s/AKfycbx6l8-zd_rrBwjknXYVkttxJKpZWCeNXTlJM3D2C1KdDGjvr3JlmlWoyaC2dHNmXO4U/exec",
  {
    method: "POST",
    body: JSON.stringify({
      nombre: decodedText
    })
  }
);

    const resultado = await respuesta.json();

    if (!resultado.encontrado) {

      document.getElementById("resultado").innerHTML =
        "❌ INVITADO NO ENCONTRADO";

    } else if (resultado.autorizado) {

      document.getElementById("resultado").innerHTML =
        "✅ ACCESO AUTORIZADO<br><br>" +
        resultado.nombre +
        "<br><br>" +
        resultado.usados +
        " de " +
        resultado.permitidos;

    } else {

      document.getElementById("resultado").innerHTML =
        "❌ ACCESO DENEGADO<br><br>" +
        resultado.nombre;

    }

  } catch(error) {

    document.getElementById("resultado").innerHTML =
      "ERROR: " + error;

  }

},
    (errorMessage) => {
      // Ignorar errores de lectura
    }
  );

})
  
.catch(err => {

  document.getElementById("resultado").innerHTML =
    "ERROR: " + err;

});

</script>

</body>
</html>
