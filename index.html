<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>LAB QR V3</title>

://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<h1>LAB QR V3</h1>

<div id="reader" style="width:350px;"></div>

<h3>Resultado:</h3>

<div id="resultado">
Esperando lectura...
</div>

<script>

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras()
  .then(devices => {

    if (devices.length > 0) {

      let camaraSeleccionada = devices[0];

      for (let i = 0; i < devices.length; i++) {

        const nombre =
          (devices[i].label || "").toLowerCase();

        if (
          nombre.includes("back") ||
          nombre.includes("rear") ||
          nombre.includes("environment")
        ) {
          camaraSeleccionada = devices[i];
          break;
        }

      }

      html5QrCode.start(
        camaraSeleccionada.id,
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {

          document.getElementById("resultado").innerHTML =
            decodedText;

        },
        (errorMessage) => {
          // Ignorar errores de lectura
        }
      );

    } else {

      document.getElementById("resultado").innerHTML =
        "No se encontraron cámaras.";

    }

  })
  .catch(err => {

    document.getElementById("resultado").innerHTML =
      "ERROR: " + err;

  });

</script>

</body>
</html>
