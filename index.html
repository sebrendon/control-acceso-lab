<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST QR</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<h1>LAB QR</h1>

<div id="reader" style="width:350px;"></div>

<div id="resultado">
Esperando lectura...
</div>

<script>

const html5QrCode =
  new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(cameras => {

  let cameraId = cameras[0].id;

  const trasera = cameras.find(c =>
    c.label.toLowerCase().includes("trasera")
  );

  if (trasera) {
    cameraId = trasera.id;
  }

  html5QrCode.start(
    cameraId,
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {

      document.getElementById("resultado").innerHTML =
        decodedText;

    },
    (errorMessage) => {
      // Ignorar errores de lectura
    }
  );

})
  
.catch(err => {

  document.getElementById("resultado").innerHTML =
    "ERROR: " + err;

});

</script>

</body>
</html>
