<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST QR</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<h1>LAB QR</h1>

<div id="reader" style="width:350px;"></div>

<div id="resultado">
Esperando lectura...
</div>

<script>

const html5QrCode =
  new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(cameras => {

  document.getElementById("resultado").innerHTML =
    "Cámaras encontradas: " + cameras.length;

})
.catch(err => {

  document.getElementById("resultado").innerHTML =
    "ERROR: " + err;

});

</script>

</body>
</html>
