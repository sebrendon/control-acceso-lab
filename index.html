<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LAB QR V2</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<h1>LAB QR V2</h1>

<div id="reader" style="width:350px;"></div>

<h3>Resultado:</h3>

<div id="resultado">
Esperando lectura...
</div>

<script>

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras()
  .then(devices => {

    if (devices.length > 0) {

      html5QrCode.start(
        devices[0].id,
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {

          document.getElementById("resultado").innerHTML =
            decodedText;

        },
        (errorMessage) => {
          // Ignorar errores de lectura
        }
      );

    }

  })
  .catch(err => {

    document.getElementById("resultado").innerHTML =
      "ERROR: " + err;

  });

</script>

</body>
</html>
