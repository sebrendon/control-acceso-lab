<meta charset="UTF-8">

<body>

<h1>LAB QR V2</h1>

<div id="reader" style="width:350px;"></div>

<h3>Resultado:</h3>

<div id="resultado">
Esperando lectura...
</div>

<script>

const html5QrCode =
  new Html5Qrcode("reader");

Html5Qrcode
  .getCameras()
  .then(devices => {

    if (devices && devices.length) {

      html5QrCode.start(

        { facingMode: "environment" },

        {
          fps: 10,
          qrbox: 250
        },

        qrCodeMessage => {

          document
            .getElementById("resultado")
            .innerHTML = qrCodeMessage;

        },

        errorMessage => {

        }

      );

    }

  })
  .catch(err => {

    alert(err);

  });

</script>

</body>
</html>
